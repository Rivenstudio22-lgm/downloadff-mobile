nav {

/* IOS */
.ios {

  box-shadow: 0 0 25px #ff00ff;

  margin-top: 20px;
  padding: 15px 30px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;

.android .btn {
  background: #00ff88;
  color: black;
  box-shadow: 0 0 15px #00ff88;
}

.ios .btn {
  background: #ff00ff;
  color: white;
  box-shadow: 0 0 15px #ff00ff;

/* FOOTER */
footer {
