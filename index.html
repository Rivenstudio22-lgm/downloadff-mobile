<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DownloadFF Mobile</title>

<!-- SEO básico -->
<meta name="description" content="Baixar Free Fire, dicas, sensibilidade e novidades 2026">

<!-- Fonte gamer -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" href="logo.png">

<style>
body {
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:black;
  color:white;
}

/* partículas */
#particles-js {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* navbar */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:black;
  border-bottom:2px solid #ff00ff;
}

.logo {color:#ffcc00;font-size:24px;}

.menu a {
  color:white;
  margin:0 10px;
  text-decoration:none;
}

.menu a:hover {color:#ffcc00;}

.login {
  border:2px solid #ff00ff;
  padding:8px 15px;
  border-radius:20px;
  box-shadow:0 0 10px #ff00ff;
}

/* hero */
.hero {
  padding:100px 40px;
  background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover;
}

.hero h1 {
  font-size:60px;
  text-shadow:0 0 20px #ff00ff;
}

.hero span {
  color:#ff00ff;
}

/* boxes */
.download {
  display:flex;
  gap:20px;
  margin-top:40px;
}

.box {
  flex:1;
  padding:30px;
  border-radius:15px;
  text-align:center;
  background:rgba(0,0,0,0.7);
}

.android {
  border:2px solid #00ff88;
  box-shadow:0 0 20px #00ff88;
}

.ios {
  border:2px solid #ff00ff;
  box-shadow:0 0 20px #ff00ff;
}

/* botão */
.btn {
  display:inline-block;
  margin-top:15px;
  padding:12px 25px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.1);
}

.android .btn {background:#00ff88;color:black;}
.ios .btn {background:#ff00ff;color:white;}

/* stats */
.stats {
  display:flex;
  justify-content:space-around;
  padding:20px;
  background:black;
}

.stats div {
  text-shadow:0 0 10px #ff00ff;
}

/* footer */
footer {
  text-align:center;
  padding:20px;
  border-top:1px solid #333;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<nav>
  <div class="logo">DownloadFF</div>
  <div class="menu">
    <a href="#">Início</a>
    <a href="#">Dicas</a>
    <a href="#">Sensibilidade</a>
    <a href="#">Contato</a>
  </div>
</nav>

<section class="hero">
  <h1>BAIXE <span>FREE FIRE</span></h1>
  <p>Dicas, downloads e novidades 2026</p>

  <div class="download">
    <div class="box android">
      <h2>ANDROID</h2>
      <a class="btn" href="https://play.google.com/store/apps/details?id=com.dts.freefireth">BAIXAR</a>
    </div>

    <div class="box ios">
      <h2>iOS</h2>
      <a class="btn" href="https://apps.apple.com">APP STORE</a>
    </div>
  </div>
</section>

<div class="stats">
  <div>+100M Downloads</div>
  <div>+80M Jogadores</div>
  <div>⭐ 4.4</div>
</div>

<footer>
© 2026 DownloadFF Mobile
</footer>

 }

</body>
</html>
