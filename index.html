<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DownloadFF Mobile</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#loader h1 {
  color: #ff00ff;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% {opacity: 0.5;}
  50% {opacity: 1;}
  100% {opacity: 0.5;}
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  border-bottom: 1px solid #ff00ff;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e') no-repeat center/cover;
  display: flex;
  align-items: center;
  padding: 50px;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

.content {
  position: relative;
  z-index: 1;
}

h1 {
  font-size: 50px;
}

.highlight {
  color: #ff00ff;
}

/* BOTÕES */
.buttons {
  display: flex;
  gap: 20px;
  margin-top: 30px;
}

.btn {
  padding: 20px 30px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  cursor: pointer;
}

.android {
  background: #00ff88;
  box-shadow: 0 0 20px #00ff88;
}

.ios {
  background: #ff00ff;
  box-shadow: 0 0 20px #ff00ff;
}

.btn:hover {
  transform: scale(1.1);
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-around;
  padding: 40px;
  border-top: 1px solid #ff00ff;
}

/* ADS */
.ads {
  padding: 30px;
  text-align: center;
  border: 1px solid purple;
  margin: 20px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h1>CARREGANDO...</h1>
</div>

<!-- NAV -->
<nav>
  <div>DownloadFF</div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="content">
    <h1>BAIXE AGORA <br><span class="highlight">FREE FIRE</span></h1>
    <p>Experiência intensa battle royale mobile</p>

    <div class="buttons">
      <a id="downloadBtn" class="btn android">DOWNLOAD APK</a>
      <a href="#" class="btn ios">APP STORE</a>
    </div>

    <br>
    <button onclick="liberarDownload()" class="btn ios">
      CLIQUE PARA LIBERAR DOWNLOAD
    </button>
  </div>
</section>

<!-- STATS -->
<section class="stats">
  <div>
    <h2>+100M</h2>
    <p>Downloads</p>
  </div>
  <div>
    <h2>+80M</h2>
    <p>Jogadores</p>
  </div>
  <div>
    <h2>4.4 ⭐</h2>
    <p>Avaliação</p>
  </div>
</section>

<!-- ADS -->
<div class="ads">
  <p>ANÚNCIO AQUI</p>
</div>

<script>
// LOADER
window.addEventListener("load", function () {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
  }, 1500);
});

// BOTÃO
function liberarDownload() {
  let btn = document.getElementById("downloadBtn");
  btn.href = "SEU_LINK_ENCURTADO_AQUI";
  btn.click();
}
</script>

</body>
</html>
