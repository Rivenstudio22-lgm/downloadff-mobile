<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DownloadFF Mobile</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: black;
  border-bottom: 2px solid purple;
}

.logo {
  color: orange;
  font-size: 22px;
  font-weight: bold;
}

.menu a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

.login {
  border: 1px solid purple;
  padding: 8px 15px;
  border-radius: 8px;
}

/* HERO */
.hero {
  padding: 60px;
  background: linear-gradient(black, #1a001a);
}

.hero h1 {
  font-size: 50px;
}

.hero span {
  color: purple;
}

/* BOTÕES */
.download {
  display: flex;
  gap: 20px;
  margin-top: 40px;
}

.box {
  flex: 1;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}

.android {
  border: 2px solid #00ff88;
  box-shadow: 0 0 20px #00ff88;
}

.ios {
  border: 2px solid purple;
  box-shadow: 0 0 20px purple;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 20px;
  border-radius: 8px;
  text-decoration: none;
  color: white;
}

.android .btn {
  background: #00ff88;
  color: black;
}

.ios .btn {
  background: purple;
}

/* FOOTER */
footer {
  margin-top: 50px;
  padding: 20px;
  text-align: center;
  border-top: 1px solid #333;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- MENU -->
<nav>
  <div class="logo">DownloadFF Mobile</div>

  <div class="menu">
    <a href="#">Início</a>
    <a href="#">Sobre</a>
    <a href="#">Recursos</a>
    <a href="#">Contato</a>
  </div>

  <div class="login">Entrar</div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>BAIXE AGORA <br><span>FREE FIRE</span></h1>

  <p>O melhor battle royale para mobile. Jogue agora!</p>

  <div class="download">
    
    <!-- ANDROID -->
    <div class="box android">
      <h2>📱 Android</h2>
      <p>Baixar para Android</p>
      <a class="btn" href="https://play.google.com/store/apps/details?id=com.dts.freefireth" target="_blank">
        Baixar Agora
      </a>
    </div>

    <!-- IOS -->
    <div class="box ios">
      <h2>🍎 iOS</h2>
      <p>Baixar para iPhone</p>
      <a class="btn" href="https://apps.apple.com" target="_blank">
        Baixar Agora
      </a>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 DownloadFF Mobile. Todos os direitos reservados.
</footer>

</body>
</html>
