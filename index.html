<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DownloadFF Mobile</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  border-bottom: 2px solid purple;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 90vh;
  background: url('https://images.unsplash.com/photo-1605902711622-cfb43c44367f') no-repeat center/cover;
  display: flex;
  align-items: center;
  padding: 50px;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  top: 0;
  left: 0;
}

.hero-content {
  position: relative;
  z-index: 1;
}

/* TITULO */
h1 {
  font-size: 50px;
}

.highlight {
  color: #ff00ff;
}

/* BOTÕES */
.buttons {
  display: flex;
  gap: 20px;
  margin-top: 30px;
}

.btn {
  padding: 20px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}

.android {
  background: #00ff88;
  box-shadow: 0 0 20px #00ff88;
}

.ios {
  background: #ff00ff;
  box-shadow: 0 0 20px #ff00ff;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-around;
  padding: 30px;
  border-top: 2px solid purple;
}

.stat {
  text-align: center;
}

/* ADS BOX */
.ads {
  margin: 30px;
  padding: 20px;
  border: 1px solid purple;
  text-align: center;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div>DownloadFF</div>
  <div>
    <a href="#">Início</a>
    <a href="#">Sobre</a>
    <a href="#">Contato</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>BAIXE AGORA <br><span class="highlight">FREE FIRE</span></h1>
    <p>O melhor battle royale para mobile.</p>

    <div class="buttons">
      <a href="SEU_LINK_ENCURTADO_AQUI" class="btn android">DOWNLOAD APK</a>
      <a href="#" class="btn ios">APP STORE</a>
    </div>
  </div>
</section>

<!-- STATS -->
<section class="stats">
  <div class="stat">
    <h2>+100M</h2>
    <p>Downloads</p>
  </div>
  <div class="stat">
    <h2>+80M</h2>
    <p>Jogadores</p>
  </div>
  <div class="stat">
    <h2>4.4 ⭐</h2>
    <p>Avaliação</p>
  </div>
</section>

<!-- ADS (GANHAR DINHEIRO) -->
<div class="ads">
  <!-- COLOCA TEU CÓDIGO ADSENSE AQUI -->
  <p>ANÚNCIO AQUI</p>
</div>

</body>
</html>
