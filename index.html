<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Gamer Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#0a0a0a;
  color:white;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#loader h1{
  color:#ff00ff;
  animation:pulse 1s infinite;
}
@keyframes pulse{
  0%{opacity:.5}
  50%{opacity:1}
  100%{opacity:.5}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid #ff00ff33;
}

/* HERO */
.hero{
  height:70vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:50px;
}

.highlight{
  color:#ff00ff;
}

/* BOTÕES */
.btn{
  margin-top:15px;
  padding:12px 25px;
  background:#ff00ff;
  color:white;
  border-radius:8px;
  text-decoration:none;
  cursor:pointer;
}

/* JOGOS */
.games{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#111;
  padding:20px;
  border-radius:10px;
  text-align:center;
  transition:.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #ff00ff;
}

/* DOWNLOAD AREA */
.download-area{
  text-align:center;
  padding:40px;
  display:none;
}

/* MINI GAME */
.game-box{
  text-align:center;
  padding:30px;
  border-top:1px solid #ff00ff33;
}

/* ADS */
.ads{
  text-align:center;
  margin:20px;
  padding:20px;
  border:1px solid purple;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader"><h1>CARREGANDO...</h1></div>

<!-- NAV -->
<nav>
  <b>Dragon Gamer</b>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>PLATAFORMA <span class="highlight">GAMER</span></h1>
  <p>Baixe e explore jogos mobile</p>
</section>

<!-- JOGOS -->
<section class="games">

<div class="card">
  <h3>Free Fire</h3>
  <p>Battle Royale</p>
  <button onclick="abrirDownload()" class="btn">DOWNLOAD</button>
</div>

<div class="card">
  <h3>PUBG</h3>
  <p>Sobrevivência</p>
  <button onclick="abrirDownload()" class="btn">DOWNLOAD</button>
</div>

</section>

<!-- AREA DOWNLOAD -->
<div id="downloadArea" class="download-area">
  <h2>🎯 Desbloqueie o Download</h2>
  <p>Jogue para liberar</p>

  <button onclick="ganhar()" class="btn">CLIQUE</button>
  <h3>Pontos: <span id="pontos">0</span></h3>
</div>

<!-- ADS -->
<div class="ads">
  <p>ANÚNCIO AQUI</p>
</div>

<script>
// LOADER
window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },1500);
}

// ABRIR DOWNLOAD
function abrirDownload(){
  document.getElementById("downloadArea").style.display="block";
  window.scrollTo(0, document.body.scrollHeight);
}

// MINI GAME
let pontos = 0;

function ganhar(){
  pontos++;
  document.getElementById("pontos").innerText = pontos;

  if(pontos >= 5){
    alert("Download liberado!");
    window.location.href = "SEU_LINK_MONETIZADO";
  }
}
</script>

</body>
</html>
