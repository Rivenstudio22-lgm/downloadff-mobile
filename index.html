<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DownloadFF Mobile</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  border-bottom: 1px solid #ff00ff;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e') no-repeat center/cover;
  display: flex;
  align-items: center;
  padding: 50px;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(black, rgba(0,0,0,0.8));
}

.content {
  position: relative;
  z-index: 1;
  animation: fadeIn 2s ease;
}

h1 {
  font-size: 55px;
}

.highlight {
  color: #ff00ff;
  text-shadow: 0 0 20px #ff00ff;
}

/* BOTÕES */
.buttons {
  margin-top: 30px;
  display: flex;
  gap: 20px;
}

.btn {
  padding: 20px 30px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.android {
  background: #00ff88;
  box-shadow: 0 0 20px #00ff88;
}

.ios {
  background: #ff00ff;
  box-shadow: 0 0 20px #ff00ff;
}

.btn:hover {
  transform: scale(1.1);
}

/* BLOQUEIO */
.locked {
  opacity: 0.5;
  pointer-events: none;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-around;
  padding: 40px;
  border-top: 1px solid #ff00ff;
}

.stat {
  text-align: center;
}

/* ADS */
.ads {
  padding: 30px;
  text-align: center;
  border: 1px solid purple;
  margin: 20px;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<!-- MUSICA -->
<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f7d2c9c7.mp3" type="audio/mp3">
</audio>

<!-- NAV -->
<nav>
  <div>DownloadFF</div>
  <div>
    <a href="#">Início</a>
    <a href="#">Sobre</a>
    <a href="#">Contato</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="content">
    <h1>BAIXE AGORA <br><span class="highlight">FREE FIRE</span></h1>
    <p>Experiência intensa battle royale mobile.</p>

    <div class="buttons">
      <a id="androidBtn" class="btn android locked">DOWNLOAD APK</a>
      <a href="#" class="btn ios">APP STORE</a>
    </div>

    <br>
    <button onclick="liberarDownload()" class="btn ios">CLIQUE PARA LIBERAR DOWNLOAD</button>
  </div>
</section>

<!-- STATS -->
<section class="stats">
  <div class="stat">
    <h2>+100M</h2>
    <p>Downloads</p>
  </div>
  <div class="stat">
    <h2>+80M</h2>
    <p>Jogadores</p>
  </div>
  <div class="stat">
    <h2>4.4 ⭐</h2>
    <p>Avaliação</p>
  </div>
</section>

<!-- ADS -->
<div class="ads">
  <!-- COLE ADSENSE AQUI -->
  <p>ANÚNCIO AQUI</p>
</div>

<script>
function liberarDownload() {
  let btn = document.getElementById("androidBtn");
  btn.classList.remove("locked");
  btn.href = "SEU_LINK_ENCURTADO_AQUI";
}
</script>

</body>
</html>
