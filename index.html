<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DownloadFF Mobile</title>

<style>body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0a0a0a, #000000);
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: rgba(0,0,0,0.8);
  border-bottom: 2px solid #8a2be2;
}

.logo {
  color: #ffcc00;
  font-size: 24px;
  font-weight: bold;
}

.menu a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  transition: 0.3s;
}

.menu a:hover {
  color: #ffcc00;
}

/* BOTÃO ENTRAR */
.login {
  border: 2px solid #8a2be2;
  padding: 8px 20px;
  border-radius: 20px;
  color: #8a2be2;
  box-shadow: 0 0 10px #8a2be2;
}

/* HERO */
.hero {
  padding: 80px 50px;
  background: url('https://images.unsplash.com/photo-1605902711622-cfb43c4437b1') no-repeat center/cover;
}

.hero h1 {
  font-size: 60px;
}

.hero span {
  color: #8a2be2;
  text-shadow: 0 0 15px #8a2be2;
}

/* DOWNLOAD BOX */
.download {
  display: flex;
  gap: 30px;
  margin-top: 50px;
}

/* ANDROID BOX */
.box.android {
  flex: 1;
  background: rgba(0,0,0,0.8);
  padding: 30px;
  border-radius: 15px;
  border: 2px solid #00ff88;
  box-shadow: 0 0 20px #00ff88;
  text-align: center;
}

/* IOS BOX */
.box.ios {
  flex: 1;
  background: rgba(0,0,0,0.8);
  padding: 30px;
  border-radius: 15px;
  border: 2px solid #ff00ff;
  box-shadow: 0 0 20px #ff00ff;
  text-align: center;
}

/* BOTÕES */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

.android .btn {
  background: #00ff88;
  color: black;
  box-shadow: 0 0 10px #00ff88;
}

.ios .btn {
  background: #ff00ff;
  color: white;
  box-shadow: 0 0 10px #ff00ff;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #444;
  margin-top: 50px;
}
